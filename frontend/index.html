<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spam Detector — Luxury Glass UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="glass-container">
        <div class="header">
            <div class="icon-box">
                <i class="fa-solid fa-shield-cat"></i>
            </div>
            <h1>Sentinel<span>AI</span></h1>
            <p>Advanced Spam & Fraud Detection Engine</p>
        </div>

        <div class="input-area">
            <textarea id="email-input" placeholder="Paste your raw email or message content here..."></textarea>
            <span class="char-count" id="char-count">0 characters</span>
        </div>

        <button id="check-btn">
            <span>Analyze Content</span>
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </button>

        <div class="result-box hidden" id="result-box">
            <div class="result-content">
                <i id="result-icon" class="fa-solid"></i>
                <div>
                    <h3 id="result-text">Analyzing...</h3>
                    <p id="result-desc"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
